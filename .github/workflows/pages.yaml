# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes to main (deploy) and ci (test only, no deploy)
  push:
    branches: ["main", "ci"]

  # Allows you to run this workflow manually from the Actions tab (choose branch in UI)
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent run per branch (main vs ci) so test runs on ci don't block production deploys
concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Data file tests — build is skipped if they fail
  test-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data file tests
        run: |
          pytest scripts/tests/ -v --tb=short
        # If tests fail, this job fails and build does not run

  # Build job
  build:
    runs-on: ubuntu-latest
    needs: test-data
    permissions:
      contents: write  # push updated routes data files when make_routes_files.py changes them
      pages: write
      id-token: write
    env:
      HUGO_VERSION: 0.132.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all history for .GitInfo and .Lastmod
          submodules: recursive
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Required secrets: GOOGLE_CREDENTIALS_JSON (service account JSON), GOOGLE_SPREADSHEET_ID
      - name: Setup Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: |
          mkdir -p secrets
          echo "$GOOGLE_CREDENTIALS_JSON" > secrets/credentials.json
          echo "GOOGLE_CREDENTIALS_PATH=secrets/credentials.json" >> $GITHUB_ENV
          echo "GOOGLE_SPREADSHEET_ID=$GOOGLE_SPREADSHEET_ID" >> $GITHUB_ENV

      - name: Run make_routes_files
        run: python scripts/make_routes_files.py

      - name: Commit and push route data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q .; then
            git add data/routes.json static/js/components/route/routes-list.js
            git commit -m "chore: update routes data from make_routes_files [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Setup Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deployment job — only on main so pushes to ci/test branches don't affect the live site
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
